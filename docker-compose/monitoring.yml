# Stack de monitoring : Prometheus + Grafana + exporters + AlertManager
# Images arm64 vérifiées sur Raspberry Pi 5.
#
# - node-exporter : métriques machine (CPU, RAM, disque, température)
# - cAdvisor : métriques par container
# - Prometheus : collecte et stocke tout ça
# - Grafana : les tableaux de bord
# - AlertManager : route les alertes (email, Telegram, ntfy...)
#
# Les fichiers de config (prometheus.yml, règles d'alertes) sont à
# créer dans ./monitoring/ ; des exemples complets sont dans la doc
# officielle de chaque outil. Sur Pi, le dashboard Grafana 1860
# ("Node Exporter Full") est un excellent point de départ.
#
# Démarrage :
#   docker compose -f monitoring.yml --env-file ../.env up -d

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # 30 jours d'historique : bon compromis espace/recul sur un Pi
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    restart: always
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    command:
      - --path.rootfs=/host
    volumes:
      # Lecture seule du système hôte pour les métriques
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # Nécessaire sur Raspberry Pi OS pour lire certains cgroups
    privileged: true
    devices:
      - /dev/kmsg

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
