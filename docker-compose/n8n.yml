# n8n : automatisation de workflows, le ciment entre tous les services
# https://n8n.io
# Images arm64 vérifiées sur Raspberry Pi 5.
#
# PostgreSQL plutôt que le SQLite par défaut : dès qu'on a
# quelques dizaines de workflows, ça change tout.
#
# ATTENTION : N8N_ENCRYPTION_KEY chiffre tous les credentials
# stockés par n8n. À générer une fois et à sauvegarder hors du
# serveur. Sans elle, une restauration de la base est inutilisable.
#
# Démarrage :
#   docker compose -f n8n.yml --env-file ../.env up -d

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - TZ=${TZ}
      - GENERIC_TIMEZONE=${TZ}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=https
      # URL publique : indispensable pour que les webhooks
      # générés pointent vers le bon domaine derrière le tunnel.
      - WEBHOOK_URL=https://${N8N_HOST}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy

  n8n-db:
    image: postgres:16-alpine
    container_name: n8n-db
    restart: always
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD}
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n-data:
  n8n-db-data:
