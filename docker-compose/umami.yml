# Umami : statistiques web respectueuses de la vie privée
# https://umami.is
# Images arm64 vérifiées sur Raspberry Pi 5.
#
# Pas de cookie, pas de bandeau RGPD à afficher, et des chiffres
# qui m'appartiennent. Un simple <script> à poser sur chaque site.
#
# Démarrage :
#   docker compose -f umami.yml --env-file ../.env up -d

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: always
    ports:
      - "3010:3000"
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_POSTGRES_PASSWORD}@umami-db:5432/umami
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: always
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_POSTGRES_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  umami-db-data:
